<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle border accent -->
  <rect x="40" y="40" width="1120" height="550" rx="2" ry="2"
        fill="none" stroke="rgba(240,240,240,0.08)" stroke-width="1"/>

  <!-- Short horizontal accent line above text -->
  <line x1="560" y1="260" x2="640" y2="260"
        stroke="rgba(240,240,240,0.15)" stroke-width="2"/>

  <!-- Main title -->
  <text x="600" y="330" text-anchor="middle"
        font-family="'Space Grotesk', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="80" fill="#f0f0f0"
        letter-spacing="4">BCHGSV.</text>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle"
        font-family="'Space Grotesk', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="22" fill="rgba(240,240,240,0.5)"
        letter-spacing="2">Director, Cinematographer &amp; Film Editor</text>

  <!-- Short horizontal accent line below text -->
  <line x1="560" y1="410" x2="640" y2="410"
        stroke="rgba(240,240,240,0.15)" stroke-width="2"/>
</svg>
