<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | BCHGSV</title>
  <link rel="icon" href="/assets/logomark.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      line-height: 1;
      color: rgba(240, 240, 240, 0.06);
      position: absolute;
      user-select: none;
    }
    .error-content {
      position: relative;
      z-index: 1;
    }
    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .error-text {
      color: rgba(240, 240, 240, 0.5);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #f0f0f0;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 12px 28px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1000px;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .error-link:hover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.05);
    }
    .error-arrow { font-size: 1.1rem; }
  </style>
</head>
<body>
  <span class="error-code">404</span>
  <div class="error-content">
    <h1 class="error-title">Page not found</h1>
    <p class="error-text">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="error-link">
      <span class="error-arrow">&#8592;</span>
      Back to home
    </a>
  </div>
</body>
</html>
